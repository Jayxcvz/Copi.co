<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Management - Copi.co Admin</title>
  <link rel="stylesheet" href="admin-style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <button class="sidebar-toggle" id="sidebar-toggle"><i class="fas fa-bars"></i></button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="admin-sidebar">
    <div class="sidebar-header">
      <img src="../assets/copico_logo.png" alt="Logo">
      <div><h2>COPI.CO</h2><span>Admin Panel</span></div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link"><i class="fas fa-chart-pie"></i> Dashboard</a>
      <a href="menu.html" class="nav-link active"><i class="fas fa-coffee"></i> Menu Management</a>
      <a href="orders.html" class="nav-link"><i class="fas fa-clipboard-list"></i> Orders <span class="link-badge" id="pending-orders-badge">0</span></a>
      <a href="payments.html" class="nav-link"><i class="fas fa-credit-card"></i> Payments</a>
      <a href="customers.html" class="nav-link"><i class="fas fa-users"></i> Customers</a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" class="nav-link" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <h1>Menu Management</h1>
        <p>Add, edit, and manage your coffee product catalog.</p>
      </div>
      <div class="topbar-right">
        <div class="admin-avatar">A</div>
      </div>
    </div>

    <div class="page-content">
      <div class="data-card">
        <div class="card-controls">
          <div class="search-input">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search products..." oninput="searchAdminMenu(this.value)">
          </div>
          <button class="btn-primary" onclick="openAddProduct()">
            <i class="fas fa-plus"></i> Add Product
          </button>
        </div>

        <table>
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Category</th>
              <th>Price</th>
              <th>Description</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="admin-menu-tbody">
            <!-- Injected by admin-script.js -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- PRODUCT MODAL -->
  <div class="admin-modal-overlay" id="product-modal">
    <div class="admin-modal">
      <div class="admin-modal-header">
        <h3 id="product-modal-title">Add New Product</h3>
        <button class="admin-modal-close" onclick="closeProductModal()"><i class="fas fa-times"></i></button>
      </div>
      <form onsubmit="saveProduct(event)">
        <div class="admin-form-group">
          <label for="prod-name">Product Name *</label>
          <input type="text" id="prod-name" class="admin-form-input" placeholder="e.g. Espresso" required>
        </div>
        <div class="admin-form-group">
          <label for="prod-category">Category</label>
          <select id="prod-category" class="admin-form-select">
            <option value="beans">Beans</option>
            <option value="equipment">Equipment</option>
            <option value="matcha">Matcha</option>
          </select>
        </div>
        <div class="admin-form-group">
          <label for="prod-price">Price (₱) *</label>
          <input type="number" id="prod-price" class="admin-form-input" placeholder="e.g. 150" required>
        </div>
        <div class="admin-form-group">
          <label for="prod-desc">Description</label>
          <input type="text" id="prod-desc" class="admin-form-input" placeholder="Short description">
        </div>
        <div class="admin-form-group">
          <label for="prod-img">Image URL</label>
          <input type="url" id="prod-img" class="admin-form-input" placeholder="https://example.com/image.png">
        </div>
        <button type="submit" class="admin-form-btn">Save Product</button>
      </form>
    </div>
  </div>

  <script src="admin-script.js"></script>
</body>
</html>
