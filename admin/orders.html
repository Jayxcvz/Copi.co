<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders - Copi.co Admin</title>
  <link rel="stylesheet" href="admin-style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <button class="sidebar-toggle" id="sidebar-toggle"><i class="fas fa-bars"></i></button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="admin-sidebar">
    <div class="sidebar-header">
      <img src="../assets/copico_logo.png" alt="Logo">
      <div><h2>COPI.CO</h2><span>Admin Panel</span></div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link"><i class="fas fa-chart-pie"></i> Dashboard</a>
      <a href="menu.html" class="nav-link"><i class="fas fa-coffee"></i> Menu Management</a>
      <a href="orders.html" class="nav-link active"><i class="fas fa-clipboard-list"></i> Orders <span class="link-badge" id="pending-orders-badge">0</span></a>
      <a href="payments.html" class="nav-link"><i class="fas fa-credit-card"></i> Payments</a>
      <a href="customers.html" class="nav-link"><i class="fas fa-users"></i> Customers</a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" class="nav-link" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <h1>Order Management</h1>
        <p>Track and manage customer coffee orders.</p>
      </div>
      <div class="topbar-right">
        <div class="admin-avatar">A</div>
      </div>
    </div>

    <div class="page-content">
      <div class="data-card">
        <div class="card-controls">
          <div class="search-input">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search by Order ID or Customer..." oninput="searchAdminOrders(this.value)">
          </div>
        </div>

        <table>
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Items</th>
              <th>Total</th>
              <th>Date</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="admin-orders-tbody">
            <!-- Injected by admin-script.js -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="admin-script.js"></script>
</body>
</html>
