<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payments - Copi.co Admin</title>
  <link rel="stylesheet" href="admin-style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <button class="sidebar-toggle" id="sidebar-toggle"><i class="fas fa-bars"></i></button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="admin-sidebar">
    <div class="sidebar-header">
      <img src="../assets/logo.png" alt="Logo">
      <div><h2>COPI.CO</h2><span>Admin Panel</span></div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link"><i class="fas fa-chart-pie"></i> Dashboard</a>
      <a href="menu.html" class="nav-link"><i class="fas fa-coffee"></i> Menu Management</a>
      <a href="orders.html" class="nav-link"><i class="fas fa-clipboard-list"></i> Orders <span class="link-badge" id="pending-orders-badge">0</span></a>
      <a href="payments.html" class="nav-link active"><i class="fas fa-credit-card"></i> Payments</a>
      <a href="customers.html" class="nav-link"><i class="fas fa-users"></i> Customers</a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" class="nav-link" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <h1>Payment Records</h1>
        <p>View all completed financial transactions.</p>
      </div>
      <div class="topbar-right">
        <div class="admin-avatar">A</div>
      </div>
    </div>

    <div class="page-content">

      <!-- PAYMENT SUMMARY -->
      <div class="metrics-grid" style="grid-template-columns: 1fr; max-width: 300px; margin-bottom: 25px;">
        <div class="metric-card sales">
          <div class="metric-icon"><i class="fas fa-peso-sign"></i></div>
          <div class="metric-value" id="payments-total">₱0</div>
          <div class="metric-label">Total Revenue Collected</div>
        </div>
      </div>

      <div class="data-card">
        <div class="card-controls">
          <h3 style="font-size:16px;">Transaction History</h3>
        </div>
        <table>
          <thead>
            <tr>
              <th>Transaction ID</th>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Amount</th>
              <th>Method</th>
              <th>Date & Time</th>
            </tr>
          </thead>
          <tbody id="admin-payments-tbody">
            <!-- Injected by admin-script.js -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="admin-script.js"></script>
</body>
</html>
