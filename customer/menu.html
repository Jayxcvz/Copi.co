<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our  Menu - Copi.co</title>
  <!-- Stylesheets -->
  <link rel="stylesheet" href="style.css">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <a href="index.html" class="logo">
      <img src="../assets/copico_logo.png" alt="Copi.co Logo">
    </a>

    <div class="menu-toggle" id="menu-toggle">
      <i class="fas fa-bars"></i>
    </div>

    <nav id="navbar">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html" class="active">Menu</a></li>
        <li><a href="orders.html">Orders</a></li>
        <li><a href="settings.html">Settings</a></li>
        <li><a href="about.html">About Us</a></li>
      </ul>
    </nav>

    <div class="nav-actions">
      <button class="icon-btn" id="user-profile-btn" title="Login / Register">
        <i class="fas fa-user"></i>
      </button>
      <button class="icon-btn" onclick="toggleCart()" title="Shopping Cart">
        <i class="fas fa-shopping-cart"></i>
        <span class="badge cart-badge">0</span>
      </button>
    </div>
  </header>

  <!-- MENU SECTION -->
  <section class="section">
    <h2 class="section-title">Our Menu</h2>
    <p class="section-subtitle">Freshly selected premium ingredients for your daily brew.</p>

    <!-- SEARCH & FILTERS -->
    <div class="menu-controls">
      <div class="search-bar">
        <i class="fas fa-search"></i>
        <input type="text" oninput="searchMenu(this.value)" placeholder="Search Items...">
      </div>

      <div class="filter-tabs">
        <button class="filter-tab active" onclick="filterMenu('all', this)">All Products</button>
        <button class="filter-tab" onclick="filterMenu('beans', this)">Beans</button>
        <button class="filter-tab" onclick="filterMenu('equipment', this)">Equipment</button>
        <button class="filter-tab" onclick="filterMenu('matcha', this)">Matcha</button>
      </div>
    </div>

    <!-- DYNAMIC PRODUCT GRID -->
    <div class="menu-container" id="customer-menu-grid">
      <!-- Injected by script.js -->
    </div>
  </section>

  <!-- PRODUCT DETAIL MODAL -->
  <div class="modal-overlay" id="product-detail-modal">
    <div class="modal-content product-detail-content">
      <button class="close-modal-btn" onclick="closeProductDetailModal()"><i class="fas fa-times"></i></button>
      <div class="product-detail-layout">
        <div class="product-detail-image">
          <img id="detail-img" src="" alt="">
        </div>
        <div class="product-detail-info">
          <h2 id="detail-name"></h2>
          <p id="detail-desc" class="detail-description"></p>
          <div class="detail-price" id="detail-price"></div>
          
          <div class="detail-options">
            <div class="option-group" id="variant-group">
              <label>Select Variant</label>
              <div class="variant-chips" id="detail-variants"></div>
            </div>
            
            <div class="option-group">
              <label>Quantity</label>
              <div class="detail-qty-control">
                <button onclick="updateDetailQty(-1)">-</button>
                <input type="number" id="detail-qty" value="1" min="1" readonly>
                <button onclick="updateDetailQty(1)">+</button>
              </div>
            </div>
          </div>
          
          <button class="auth-btn" id="add-to-cart-detail-btn">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SHOPPING CART SIDEBAR -->
  <div class="cart-sidebar" id="cart-sidebar">
    <div class="cart-header">
      <h2><i class="fas fa-shopping-cart"></i> Your Cart</h2>
      <button class="close-cart-btn" onclick="toggleCart()">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="cart-items" id="cart-items-container">
      <!-- Injected by script.js -->
    </div>
    <div class="cart-footer">
      <div class="cart-summary-row">
        <span>Subtotal</span>
        <span id="cart-subtotal">₱0.00</span>
      </div>
      <button class="checkout-btn" id="cart-checkout-btn" onclick="openCheckoutModal()" disabled>
        Proceed to Checkout
      </button>
    </div>
  </div>

  <!-- CHECKOUT MODAL -->
  <div class="modal-overlay" id="checkout-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Checkout Details</h3>
        <button class="close-modal-btn" onclick="closeCheckoutModal()">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <form onsubmit="processCheckout(event)">
        <div class="form-group">
          <label for="customer-name">Full Name *</label>
          <input type="text" id="customer-name" class="form-input" required>
        </div>
        <div class="form-group">
          <label for="customer-email">Email Address</label>
          <input type="email" id="customer-email" class="form-input">
        </div>
        <div class="form-group">
          <label for="customer-phone">Phone Number *</label>
          <input type="tel" id="customer-phone" class="form-input" placeholder="e.g. 09123456789" required>
        </div>
        <div class="form-group">
          <label for="customer-address">Delivery Address *</label>
          <input type="text" id="customer-address" class="form-input" placeholder="House/Bldg, Street, City" required>
        </div>
        
        <div class="form-group">
          <label>Payment Method</label>
          <div class="select-payment">
            <div class="payment-option selected" onclick="selectPaymentMethod(this, 'Cash')">
              <i class="fas fa-money-bill-wave"></i>
              <span>Cash</span>
            </div>
            <div class="payment-option" onclick="selectPaymentMethod(this, 'GCash')">
              <i class="fas fa-mobile-alt"></i>
              <span>GCash</span>
            </div>
            <div class="payment-option" onclick="selectPaymentMethod(this, 'Card')">
              <i class="fas fa-credit-card"></i>
              <span>Card</span>
            </div>
          </div>
        </div>

        <button type="submit" class="auth-btn">Place Order</button>
      </form>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="socials">
      <a href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer" title="Follow us on Instagram"><i class="fab fa-instagram"></i></a>
      <a href="https://www.facebook.com/" target="_blank" rel="noopener noreferrer" title="Like us on Facebook"><i class="fab fa-facebook"></i></a>
      <a href="https://www.tiktok.com/" target="_blank" rel="noopener noreferrer" title="Follow us on TikTok"><i class="fab fa-tiktok"></i></a>
    </div>
    <div class="copyright">
      &copy; 2026 Copi.co | All rights reserved.
    </div>
  </footer>

  <!-- Scripts -->
  <script src="script.js"></script>

</body>
</html>
